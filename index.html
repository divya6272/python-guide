  must:[

    {id:'memory',badge:'b6',title:'Memory Model',tabs:['id & is','mutable vs immutable','copy'],

const qs=[
  {q:"list vs tuple — difference?",a:"List = mutable, tuple = immutable + hashable. Tuple can be a dict key, list cannot. Tuple is faster."},
  {q:"What is the GIL?",a:"Global Interpreter Lock. Only one thread runs Python at a time. Use <code>multiprocessing</code> for CPU tasks. <code>threading</code> only for I/O."},
  {q:"*args vs **kwargs?",a:"<code>*args</code> = extra positionals → arrives as tuple. <code>**kwargs</code> = extra keywords → arrives as dict."},
  {q:"__str__ vs __repr__?",a:"<code>__str__</code> for users → called by print(). <code>__repr__</code> for devs → called in REPL. Always define __repr__ at minimum."},
  {q:"@classmethod vs @staticmethod?",a:"<code>@classmethod</code> gets cls → class state or alt constructor. <code>@staticmethod</code> gets nothing → utility function."},
  {q:"What does @wraps do?",a:"Preserves __name__ and __doc__ after decorating. Without it function is renamed 'wrapper'."},
  {q:"What is a generator?",a:"Uses <code>yield</code>. One value at a time. Memory efficient — nothing stored upfront."},
  {q:"Encapsulation vs Abstraction?",a:"Encapsulation = hide data (__). Abstraction = hide implementation (ABC). Car: hidden engine = encapsulation. Steering wheel only = abstraction."},
  {q:"What is LEGB?",a:"Name lookup order: Local → Enclosing → Global → Built-in. Stops at first match."},
  {q:"What is a closure?",a:"Inner function remembers outer variables even after outer function has returned."},
  {q:"What does @property do?",a:"Turns a method into an attribute-style getter/setter. Adds validation without changing how you access it."},
  {q:"Shallow vs deep copy?",a:"Shallow = outer copied, inner still shared. Deep = fully independent copy of everything."},
  {q:"Counter vs defaultdict?",a:"<code>Counter</code> counts occurrences. <code>defaultdict</code> returns a default value instead of raising KeyError."},
  {q:"What is nonlocal?",a:"Lets inner function write to a variable in the enclosing (outer) function scope."},
  {q:"is vs ==?",a:"<code>==</code> checks value. <code>is</code> checks same object in memory (same id). Always use == for value comparison."},
  {q:"Why is dict O(1) lookup?",a:"Uses a hash table internally. Hash of key maps directly to memory location — no scanning needed."},
  {q:"mutable vs immutable?",a:"Immutable: int, str, tuple, float — cannot change in place, new object created. Mutable: list, dict, set — change in place."},
  {q:"What is a context manager?",a:"<code>with</code> statement. Calls __enter__ on open, __exit__ on close even if error occurs. Used for files, locks, timers."},
];

const gotchas=[
  {q:"Mutable default argument",code:`def f(lst=[]):      # BAD — shared across all calls\n    lst.append(1)\ndef f(lst=None):    # GOOD\n    if lst is None: lst = []`},
  {q:"b = a copies the reference, not the list",code:`a = [1,2,3]\nb = a\nb.append(4)\nprint(a)   # [1,2,3,4] ← surprise!\nb = a.copy()  # fix`},
  {q:"is vs == with integers",code:`a=256;b=256; a is b  # True (cached)\na=257;b=257; a is b  # False\n# always use ==`},
  {q:"Empty set must be set()",code:`x = {}       # dict!\nx = set()    # correct`},
  {q:"List multiplication trap",code:`grid=[[0]*3]*3\ngrid[0][0]=9  # [[9,0,0],[9,0,0],[9,0,0]] all same!\n# Fix:\ngrid=[[0]*3 for _ in range(3)]`},
  {q:"Late binding in closures",code:`fns=[lambda:i for i in range(3)]\n[f() for f in fns]  # [2,2,2] wrong!\n# Fix:\nfns=[lambda i=i:i for i in range(3)]`},
  {q:"UnboundLocalError",code:`x=10\ndef f():\n    print(x)   # UnboundLocalError!\n    x=20       # Python treats x as local throughout\n# Fix: global x`},
  {q:"dict.get() vs dict[key]",code:`d={"a":1}\nd["b"]        # KeyError\nd.get("b",0)  # 0 — safe`},
];

function render(){
  const map={basics:'g-basics',functions:'g-functions',oop:'g-oop',advanced:'g-advanced',ds:'g-ds',must:'g-must'};
  Object.entries(topics).forEach(([sec,list])=>{
    document.getElementById(map[sec]).innerHTML=list.map(t=>`
      <div class="card" onclick="open_('${sec}','${t.id}')">
        <div class="badge ${t.badge}">${sec}</div>
        <div class="ctitle">${t.title}</div>
        <div class="csub">${t.tabs.slice(0,3).join(' · ')}</div>
      </div>`).join('');
  });

  document.getElementById('qaList').innerHTML=qs.map((q,i)=>`
    <div class="qa">
      <div class="qa-q" onclick="tq('q${i}')"><span>${q.q}</span><span>+</span></div>
      <div class="qa-a" id="q${i}">${q.a}</div>
    </div>`).join('');

  document.getElementById('gotchaList').innerHTML=gotchas.map((g,i)=>`
    <div class="qa">
      <div class="qa-q" onclick="tq('g${i}')"><span>${g.q}</span><span>+</span></div>
      <div class="qa-a" id="g${i}"><pre>${g.code}</pre></div>
    </div>`).join('');
}

function open_(sec,id){
  const t=topics[sec].find(x=>x.id===id);
  document.getElementById('home-view').style.display='none';
  document.getElementById('lesson-view').style.display='block';
  const stabs=t.tabs.map((tab,i)=>
    `<button class="stb${i===0?' on':''}" onclick="ss(${i},this)">${tab}</button>`
  ).join('');
  const sps=t.tabs.map((tab,i)=>`
    <div id="sp-${i}" class="sp${i===0?' on':''}">
      <div class="why">${t.why[i]}</div>
      <pre>${t.code[i]}</pre>
    </div>`).join('');
  document.getElementById('lesson-body').innerHTML=
    `<div class="lname">${t.title}</div><div class="stabs">${stabs}</div>${sps}`;
}

function goHome(){
  document.getElementById('home-view').style.display='block';
  document.getElementById('lesson-view').style.display='none';
}

function tq(id){document.getElementById(id).classList.toggle('on')}

function showTab(n,btn){
  document.querySelectorAll('.top-tabs>.ttb').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('#tab-topics,#tab-interview,#tab-gotchas').forEach(p=>p.classList.remove('on'));
  document.getElementById('tab-'+n).classList.add('on');
  btn.classList.add('on');
}

function ss(i,btn){
  btn.closest('.stabs').querySelectorAll('.stb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('[id^="sp-"]').forEach(p=>p.classList.remove('on'));
  document.getElementById('sp-'+i).classList.add('on');
}

render();
</script>
